name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev

      - name: Build .deb package
        run: bash scripts/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: flovenet-amd64-deb
          path: target/flovenet_*.deb
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Build daemon
        run: cargo build --release --bin daemon --target x86_64-pc-windows-msvc

      - name: Upload daemon.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: flovenet-x86_64-windows
          path: target/x86_64-pc-windows-msvc/release/daemon.exe
          retention-days: 1

  build-macos:
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build daemon
        run: cargo build --release --bin daemon --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: flovenet-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/daemon
          retention-days: 1

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flovenet-amd64-deb

      - uses: actions/download-artifact@v4
        with:
          name: flovenet-x86_64-windows

      - uses: actions/download-artifact@v4
        with:
          name: flovenet-x86_64-apple-darwin
          path: macos-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: flovenet-aarch64-apple-darwin
          path: macos-aarch64

      - name: Rename macOS binaries
        run: |
          mv macos-x86_64/daemon daemon-x86_64-apple-darwin
          mv macos-aarch64/daemon daemon-aarch64-apple-darwin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flovenet_*.deb
            daemon.exe
            daemon-x86_64-apple-darwin
            daemon-aarch64-apple-darwin
          generate_release_notes: true
