name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg-dev

      - name: Build .deb package
        run: bash scripts/build-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: flovenet-amd64-deb
          path: target/flovenet_*.deb
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Build daemon
        run: cargo build --release --bin daemon --target x86_64-pc-windows-msvc

      - name: Upload daemon.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: flovenet-x86_64-windows
          path: target/x86_64-pc-windows-msvc/release/daemon.exe
          retention-days: 1

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flovenet-amd64-deb

      - uses: actions/download-artifact@v4
        with:
          name: flovenet-x86_64-windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flovenet_*.deb
            daemon.exe
          generate_release_notes: true
