name: flovenet
base: core22
version: "0.1.0"
summary: Decentralized compute sharing network
description: |
  Flovenet is a P2P network for sharing computing resources
  (CPU, RAM, GPU, storage) across devices. It supports WASM
  job execution, social features, and a reputation system.

grade: stable
confinement: strict

apps:
  daemon:
    command: bin/flovenet daemon --api-port 9090
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - network-bind
      - hardware-observe
      - system-observe
    environment:
      RUST_LOG: info
      FLOVENET_DATA_DIR: $SNAP_DATA/var/lib/flovenet
      FLOVENET_CACHE_DIR: $SNAP_DATA/var/cache/flovenet

  gateway:
    command: bin/flovenet api-gateway --port 8080
    daemon: simple
    restart-condition: on-failure
    plugs:
      - network
      - network-bind
    environment:
      RUST_LOG: info
      FLOVENET_DATA_DIR: $SNAP_DATA/var/lib/flovenet

  status:
    command: bin/flovenet status
    plugs:
      - network

  share:
    command: bin/flovenet share
    plugs:
      - hardware-observe
      - system-observe

parts:
  flovenet:
    plugin: rust
    source: .
    build-packages:
      - pkg-config
      - libssl-dev
    stage-packages:
      - libssl3
      - ca-certificates
    override-build: |
      rustup target add x86_64-unknown-linux-gnu
      cargo build --release --bin daemon
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp target/release/daemon $SNAPCRAFT_PART_INSTALL/bin/flovenet
      strip $SNAPCRAFT_PART_INSTALL/bin/flovenet
